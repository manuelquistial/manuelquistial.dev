<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="UDEA FCF digital ecosystem architecture overview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#121722"/>
    </linearGradient>
    <style>
      .box { fill: #171c28; stroke: #2a3344; stroke-width: 2; rx: 12; }
      .title { fill: #e8eaed; font: 600 18px Inter, system-ui, sans-serif; }
      .label { fill: #9aa3b2; font: 500 14px Inter, system-ui, sans-serif; }
      .line { stroke: #5b8def; stroke-width: 2; fill: none; opacity: 0.7; }
    </style>
  </defs>
  <rect width="960" height="420" fill="url(#bg)"/>
  <text x="40" y="42" class="title">UDEA FCF Digital Ecosystem (overview)</text>

  <rect class="box" x="40" y="80" width="200" height="90"/>
  <text x="60" y="118" class="title">Legacy Apps</text>
  <text x="60" y="145" class="label">Laravel · Symfony</text>

  <rect class="box" x="280" y="80" width="200" height="90"/>
  <text x="300" y="118" class="title">Modern APIs</text>
  <text x="300" y="145" class="label">Laravel · Python</text>

  <rect class="box" x="520" y="80" width="200" height="90"/>
  <text x="540" y="118" class="title">Frontends</text>
  <text x="540" y="145" class="label">React · Next.js</text>

  <rect class="box" x="760" y="80" width="160" height="90"/>
  <text x="780" y="118" class="title">Reporting</text>
  <text x="780" y="145" class="label">FastAPI · Flask</text>

  <rect class="box" x="200" y="230" width="220" height="90"/>
  <text x="220" y="268" class="title">Keycloak / OIDC</text>
  <text x="220" y="295" class="label">Centralized identity</text>

  <rect class="box" x="540" y="230" width="220" height="90"/>
  <text x="560" y="268" class="title">Databases</text>
  <text x="560" y="295" class="label">MySQL · PostgreSQL</text>

  <path class="line" d="M140 170 L140 230"/>
  <path class="line" d="M380 170 L310 230"/>
  <path class="line" d="M620 170 L310 230"/>
  <path class="line" d="M840 170 L650 230"/>
  <path class="line" d="M420 275 L540 275"/>
</svg>
